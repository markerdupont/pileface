<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pile ou Face</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:40px;
    background:#f5f5f5;
}
h1{
    font-size:3rem;
}
#resultat{
    font-size:2rem;
    margin:25px;
    font-weight:bold;
}
button{
    font-size:1.4rem;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
ul{
    list-style:none;
    padding:0;
}
li{
    background:white;
    margin:8px auto;
    padding:10px;
    width:220px;
    border-radius:8px;
}
</style>
</head>
<body>
<h1>🪙 Pile ou Face</h1>
<div id="resultat">
Clique sur le bouton
</div>
<button onclick="lancer()">
Lancer la pièce
</button>
<h2>5 derniers résultats</h2>
<ul id="liste"></ul>
<script type="module">
import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabaseUrl =
'https://ccpveaivuzbbtjhixdeh.supabase.co';
const supabaseKey =
'sb_publishable_YgS5-5Bqh3FPiKX4mKyDgQ_8v0Gfimz';
const supabase =
createClient(supabaseUrl, supabaseKey);
async function chargerHistorique() {
const { data, error } = await supabase
.from('flips')
.select('*')
.order('created_at', { ascending: false })
.limit(5);
if(error){
    console.error(error);
    return;
}
const liste =
document.getElementById('liste');
liste.innerHTML = '';
data.forEach(item => {
    const li =
    document.createElement('li');
    li.textContent =
    item.result;
    liste.appendChild(li);
});
}
window.lancer = async function() {
const resultat =
Math.random() < 0.5 ? 'PILE' : 'FACE';
document.getElementById('resultat')
.innerText = resultat;
const { error } = await supabase
.from('flips')
.insert([
    { result: resultat }
]);
if(error){
    console.error(error);
    return;
}
chargerHistorique();
}
chargerHistorique();
</script>
</body>
</html>
