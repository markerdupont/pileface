<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pile ou Face</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 3rem;
    }

    #resultat {
      font-size: 2rem;
      margin: 30px;
      font-weight: bold;
    }

    button {
      font-size: 1.5rem;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #historique {
      margin-top: 30px;
      font-size: 1.2rem;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 5px auto;
      padding: 10px;
      width: 200px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>🪙 Pile ou Face</h1>

  <div id="resultat">Clique sur le bouton</div>

  <button onclick="lancer()">
    Lancer la pièce
  </button>

  <div id="historique">
    <h2>5 derniers résultats</h2>
    <ul id="liste"></ul>
  </div>

  <script>
    let historique = [];

    function lancer() {
      const resultat = Math.random() < 0.5 ? "PILE" : "FACE";

      document.getElementById("resultat").innerText = resultat;

      historique.unshift(resultat);

      if (historique.length > 5) {
        historique.pop();
      }

      afficherHistorique();
    }

    function afficherHistorique() {
      const liste = document.getElementById("liste");

      liste.innerHTML = "";

      historique.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        liste.appendChild(li);
      });
    }
  </script>

</body>
</html>
