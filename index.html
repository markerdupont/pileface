<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pile ou Face</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      background-color: #f5f5f5;
    }

    h1 {
      font-size: 3rem;
    }

    #resultat {
      font-size: 2rem;
      margin: 30px;
      font-weight: bold;
    }

    button {
      font-size: 1.5rem;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <h1>🪙 Pile ou Face</h1>

  <div id="resultat">
    Clique sur le bouton
  </div>

  <button onclick="lancer()">
    Lancer la pièce
  </button>

  <script>
    function lancer() {
      const resultat = Math.random() < 0.5 ? "PILE" : "FACE";
      document.getElementById("resultat").innerText = resultat;
    }
  </script>

</body>
</html>
